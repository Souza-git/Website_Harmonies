<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas e Ranking - Harmonies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="estatisticas-page">
    <header>
        <a href="index.html" class="back-link">← Voltar ao Início</a>
        <h1>🏆 Estatísticas e Ranking</h1>
        <p>Os maiores ecossistemas da sua mesa</p>
    </header>

    <div class="grid-2-col" style="display: flex; flex-direction: column; gap: 20px;">
        <!-- Card: Hall da Fama -->
        <section class="card">
            <h2>👑 Hall da Fama (Vitórias em Grupo)</h2>
            <div id="hall-fama">
                <p>Carregando ranking...</p>
            </div>
        </section>

        <!-- Card: Recorde de Pontos -->
        <section class="card">
            <h2>📈 Maior Pontuação</h2>
            <div id="recorde" style="text-align: center; padding: 10px 0;">
                <p>Carregando recorde...</p>
            </div>
        </section>

        <!-- Card: Espírito Mais Usado -->
        <section class="card">
            <h2>🌿 Espírito da Natureza Favorito</h2>
            <div id="espirito-fav" style="text-align: center; padding: 10px 0;">
                <p>Carregando espírito...</p>
            </div>
        </section>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
